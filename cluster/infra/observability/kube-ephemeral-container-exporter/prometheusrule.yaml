---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kube-ephemeral-container-exporter-alerts
  namespace: observability
  labels:
    app.kubernetes.io/name: kube-ephemeral-container-exporter
    app.kubernetes.io/component: controller
spec:
  groups:
    - name: kube-ephemeral-container-exporter-alerts
      rules:
        - alert: EphemeralContainersExporterDown
          expr: |
            absent(up{job="kube-ephemeral-container-exporter"}) or
            max_over_time(up{job="kube-ephemeral-container-exporter"}[15m]) < 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: kube-ephemeral-container-exporter is unavailable
            description: kube-ephemeral-container-exporter has not exposed a healthy scrape target for the last 15m.
        - alert: EphemeralContainerRunningTooLong
          expr: kube_pod_ephemeral_container_running_present > 0
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: Ephemeral container running too long
            description: Pod {{ $labels.namespace }}/{{ $labels.pod }} has had at least one running ephemeral container for more than 1h.
