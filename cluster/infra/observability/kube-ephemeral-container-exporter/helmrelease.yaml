---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-ephemeral-container-exporter
  namespace: observability
spec:
  interval: 20m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: kube-ephemeral-container-exporter
      version: 0.2.1
      sourceRef:
        kind: HelmRepository
        name: containeroo
        namespace: flux-system
      interval: 30m
