---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: observability
spec:
  interval: 20m
  driftDetection:
    mode: enabled
  dependsOn:
    - name: envoy-gateway
      namespace: network
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 87.16.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 30m
  install:
    crds: Skip
  upgrade:
    crds: Skip
  valuesFrom:
    - kind: Secret
      name: kube-prometheus-stack-helm-values
      optional: false
  values:
    prometheusOperator:
      fullnameOverride: prometheus-operator
      serviceMonitor:
        selfMonitor: false

    alertmanager:
      ingress:
        enabled: false
      route:
        main:
          enabled: true
          hostnames:
            - alertmanager.${BASE_DOMAIN}
          annotations:
            cloudflare-operator.io/ignore: "true"
          parentRefs:
            - name: envoy-internal
              namespace: network
              sectionName: https
      serviceMonitor:
        selfMonitor: false
      config:
        global:
          resolve_timeout: 10m
        time_intervals:
          - name: business_hours
            time_intervals:
              - weekdays: ["monday:friday"]
                times:
                  - start_time: 07:30
                    end_time: 22:30
          - name: weekend
            time_intervals:
              - weekdays: ["saturday", "sunday"]
                times:
                  - start_time: 09:00
                    end_time: 23:30
        receivers:
          - name: heartbeats
            webhook_configs:
              - send_resolved: true
                url: https://heartbeats.tools.${BASE_DOMAIN}/bump/watchdog-prometheus
          - name: slack
            slack_configs:
              - channel: "#alertmanager"
                send_resolved: true
                username: Alertmanager
                icon_url: https://github.com/gi8lino/dashboard-icons/raw/master/png/alertmanager.png
                text: |-
                  {{ range .Alerts }}
                    *Alert:* {{ .Annotations.summary }} - `{{ .Labels.severity }}`
                    *Description:* {{ .Annotations.description }}
                    *Details:*
                    {{ range .Labels.SortedPairs }} • *{{ .Name }}:* `{{ .Value }}`
                    {{ end }}
                  {{ end }}
                title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] Monitoring Event Notification'
          - name: blackhole
        route:
          group_by:
            - job
          group_interval: 2m
          group_wait: 60s
          receiver: slack # default receiver
          repeat_interval: 2h
          routes:
            - receiver: heartbeats
              matchers:
                - alertname = Watchdog
              repeat_interval: 15m
              group_wait: 0s # no wait
              group_interval: 10s
            - receiver: blackhole
              matchers:
                - alertname = InfoInhibitor
                - severity =~ none|info
            - receiver: slack
              active_time_intervals:
                - business_hours
                - weekend

    defaultRules:
      create: true
      rules:
        alertmanager: true # alert routing health
        configReloaders: false # low value
        etcd: false # no etcd scraping
        general: true # watchdog/info rules
        k8sContainerCpuLimits: false # dashboard recording
        k8sContainerCpuRequests: false # dashboard recording
        k8sContainerCpuUsageSecondsTotal: false # dashboard recording
        k8sContainerMemoryCache: false # dashboard recording
        k8sContainerMemoryLimits: false # dashboard recording
        k8sContainerMemoryRequests: false # dashboard recording
        k8sContainerMemoryRss: false # dashboard recording
        k8sContainerMemorySwap: false # dashboard recording
        k8sContainerMemoryWorkingSetBytes: false # dashboard recording
        k8sContainerResource: false # dashboard recording
        k8sPodOwner: false # dashboard recording
        kubeApiserverAvailability: false # heavy SLO math
        kubeApiserverBurnrate: false # heavy SLO math
        kubeApiserverHistogram: false # heavy SLO math
        kubeApiserverSlos: false # heavy SLO math
        kubeControllerManager: false # no scrape target
        kubelet: false # no kubelet scrape
        kubePrometheusGeneral: false # replaced by basic rules
        kubePrometheusNodeRecording: false # dashboard recording
        kubeProxy: false # no scrape target
        kubeSchedulerAlerting: false # no scrape target
        kubeSchedulerRecording: false # no scrape target
        kubeStateMetrics: true # exporter health
        kubernetesApps: false # replaced by basic rules
        kubernetesResources: false # noisy capacity rules
        kubernetesStorage: false # needs kubelet metrics
        kubernetesSystem: false # noisy kubelet rules
        network: false # not useful here
        node: true # host basics
        nodeExporterAlerting: true # disk/cpu/memory basics
        nodeExporterRecording: false # dashboard recording
        prometheus: true # Prometheus health
        prometheusOperator: true # operator health
        windows: false # no Windows nodes

    grafana:
      fullnameOverride: grafana
      ingress:
        enabled: false
      route:
        main:
          enabled: true
          hostnames:
            - grafana.${BASE_DOMAIN}
          annotations:
            cloudflare-operator.io/ignore: "true"
          parentRefs:
            - name: envoy-internal
              namespace: network
              sectionName: https
      assertNoLeakedSecrets: false
      defaultDashboardsTimezone: browser
      envFromSecret: kube-prometheus-stack-grafana-settings
      grafana.ini:
        analytics:
          check_for_updates: false
        auth:
          disable_login_form: true
          oauth_auto_login: true
        auth.basic:
          enabled: true
        auth.generic_oauth:
          enabled: true
          allow_sign_up: true
          name: SSO
          client_id: $__env{GRAFANA_AUTH_CLIENT_ID}
          client_secret: $__env{GRAFANA_AUTH_CLIENT_SECRET}
          auth_url: https://sso.${BASE_DOMAIN}/realms/master/protocol/openid-connect/auth
          token_url: https://sso.${BASE_DOMAIN}/realms/master/protocol/openid-connect/token
          api_url: https://sso.${BASE_DOMAIN}/realms/master/protocol/openid-connect/userinfo
          scopes: openid profile email
          signout_redirect_url: https://sso.${BASE_DOMAIN}/realms/master/protocol/openid-connect/logout
          role_attribute_path: contains(roles[*], 'admins') && 'Admin' || 'Viewer'
        server:
          root_url: https://grafana.${BASE_DOMAIN}
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
          resource: configmap
        datasources:
          enabled: true
          searchNamespace: ALL
          resource: configmap
      plugins:
        - grafana-piechart-panel
        - grafana-worldmap-panel
      serviceMonitor:
        enabled: false

    kubeApiServer:
      enabled: false

    kubelet:
      enabled: false

    kubeControllerManager:
      enabled: false

    kubeScheduler:
      enabled: false

    kubeProxy:
      enabled: false

    kubeEtcd:
      enabled: false

    coreDns:
      enabled: true
      serviceMonitor:
        interval: 60s

    kubeDns:
      enabled: false

    kube-state-metrics:
      fullnameOverride: kube-state-metrics
      metricDenylist:
        - kube_replicaset_.*
      prometheus:
        monitor:
          enabled: true
          http:
            interval: 60s

    prometheus-node-exporter:
      fullnameOverride: node-exporter
      prometheus:
        monitor:
          enabled: true
          interval: 60s
      extraArgs:
        - --collector.filesystem.mount-points-exclude=^/(mnt|dev|proc|sys|var/lib/docker/.+)($|/)
        - --collector.textfile.directory=/run/prometheus
      extraHostVolumeMounts:
        - name: node-exporter-textfile-collector-scripts
          hostPath: /run/prometheus
          mountPath: /run/prometheus
          readOnly: true

    prometheus:
      ingress:
        enabled: false
      route:
        main:
          enabled: true
          hostnames:
            - prometheus.${BASE_DOMAIN}
          annotations:
            cloudflare-operator.io/ignore: "true"
          parentRefs:
            - name: envoy-internal
              namespace: network
              sectionName: https

      prometheusSpec:
        retention: 3d
        retentionSize: 8GB
        scrapeInterval: 60s
        evaluationInterval: 60s

        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false

        resources:
          requests:
            cpu: 100m
            memory: 512Mi

        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 10Gi

        additionalScrapeConfigs:
          - job_name: node-exporter
            scrape_interval: 60s
            static_configs:
              - targets:
                  - vpn.srv.${BASE_DOMAIN}:9100
                  - tools.srv.${BASE_DOMAIN}:9100

          - job_name: smartctl-exporter
            scrape_interval: 5m
            static_configs:
              - targets:
                  - vpn.srv.${BASE_DOMAIN}:9633
                  - tools.srv.${BASE_DOMAIN}:9633

          - job_name: heartbeats
            scrape_interval: 60s
            static_configs:
              - targets:
                  - heartbeats.tools.${BASE_DOMAIN}
