---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: observability
spec:
  interval: 20m
  driftDetection:
    mode: enabled
  dependsOn:
    - name: envoy-gateway
      namespace: network
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 87.5.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 30m
  install:
    crds: Skip
  upgrade:
    crds: Skip
  valuesFrom:
    - kind: Secret
      name: kube-prometheus-stack-helm-values
      optional: false
  values:
    prometheusOperator:
      fullnameOverride: prometheus-operator
      serviceMonitor:
        selfMonitor: false

    alertmanager:
      ingress:
        enabled: false
      route:
        main:
          enabled: true
          hostnames:
            - alertmanager.${BASE_DOMAIN}
          annotations:
            cloudflare-operator.io/ignore: "true"
          parentRefs:
            - name: envoy-internal
              namespace: network
              sectionName: https
      serviceMonitor:
        selfMonitor: false
      config:
        global:
          resolve_timeout: 10m
        time_intervals:
          - name: business_hours
            time_intervals:
              - weekdays: ["monday:friday"]
                times:
                  - start_time: 07:30
                    end_time: 22:30
          - name: weekend
            time_intervals:
              - weekdays: ["saturday", "sunday"]
                times:
                  - start_time: 09:00
                    end_time: 23:30
        receivers:
          - name: heartbeats
            webhook_configs:
              - send_resolved: true
                url: https://heartbeats.tools.${BASE_DOMAIN}/bump/watchdog-prometheus
          - name: slack
            slack_configs:
              - channel: "#alertmanager"
                send_resolved: true
                username: Alertmanager
                icon_url: https://github.com/gi8lino/dashboard-icons/raw/master/png/alertmanager.png
                text: |-
                  {{ range .Alerts }}
                    *Alert:* {{ .Annotations.summary }} - `{{ .Labels.severity }}`
                    *Description:* {{ .Annotations.description }}
                    *Details:*
                    {{ range .Labels.SortedPairs }} • *{{ .Name }}:* `{{ .Value }}`
                    {{ end }}
                  {{ end }}
                title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] Monitoring Event Notification'
          - name: blackhole
        route:
          group_by:
            - job
          group_interval: 2m
          group_wait: 60s
          receiver: slack # default receiver
          repeat_interval: 2h
          routes:
            - receiver: heartbeats
              matchers:
                - alertname = Watchdog
              repeat_interval: 15m
              group_wait: 0s # no wait
              group_interval: 10s
            - receiver: blackhole
              matchers:
                - alertname = InfoInhibitor
                - severity =~ none|info
            - receiver: slack
              active_time_intervals:
                - business_hours
                - weekend

    # Keep the default rule set, but disable the noisy control-plane parts
    # which reference metrics we no longer scrape.
    defaultRules:
      create: true
      rules:
        etcd: false
        kubeApiserverAvailability: false
        kubeApiserverBurnrate: false
        kubeApiserverHistogram: false
        kubeApiserverSlos: false
        kubeControllerManager: false
        kubeProxy: false
        kubeSchedulerAlerting: false
        kubeSchedulerRecording: false

    grafana:
      fullnameOverride: grafana
      ingress:
        enabled: false
      route:
        main:
          enabled: true
          hostnames:
            - grafana.${BASE_DOMAIN}
          annotations:
            cloudflare-operator.io/ignore: "true"
          parentRefs:
            - name: envoy-internal
              namespace: network
              sectionName: https
      assertNoLeakedSecrets: false
      defaultDashboardsTimezone: browser
      envFromSecret: kube-prometheus-stack-grafana-settings
      grafana.ini:
        analytics:
          check_for_updates: false
        auth:
          disable_login_form: true
          oauth_auto_login: true
        auth.basic:
          enabled: true
        auth.generic_oauth:
          enabled: true
          allow_sign_up: true
          name: SSO
          client_id: $__env{GRAFANA_AUTH_CLIENT_ID}
          client_secret: $__env{GRAFANA_AUTH_CLIENT_SECRET}
          auth_url: https://sso.${BASE_DOMAIN}/realms/master/protocol/openid-connect/auth
          token_url: https://sso.${BASE_DOMAIN}/realms/master/protocol/openid-connect/token
          api_url: https://sso.${BASE_DOMAIN}/realms/master/protocol/openid-connect/userinfo
          scopes: openid profile email
          signout_redirect_url: https://sso.${BASE_DOMAIN}/realms/master/protocol/openid-connect/logout
          role_attribute_path: contains(roles[*], 'admins') && 'Admin' || 'Viewer'
        server:
          root_url: https://grafana.${BASE_DOMAIN}
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
          resource: configmap
        datasources:
          enabled: true
          searchNamespace: ALL
          resource: configmap
      plugins:
        - grafana-piechart-panel
        - grafana-worldmap-panel
      serviceMonitor:
        enabled: false

    # Biggest offenders from your TSDB output.
    # Disable full apiserver metrics/histograms.
    kubeApiServer:
      enabled: false

    # Disable kubelet/cAdvisor. This removes container-level CPU/memory metrics,
    # but kube-state-metrics still gives pod status, restarts, waiting reasons,
    # deployment readiness, etc.
    kubelet:
      enabled: false

    # These were each ~87k samples per scrape in your output.
    kubeControllerManager:
      enabled: false

    kubeScheduler:
      enabled: false

    kubeProxy:
      enabled: false

    kubeEtcd:
      enabled: false

    # CoreDNS is small enough to keep. Disable if you want to go even leaner.
    coreDns:
      enabled: true
      serviceMonitor:
        interval: 60s

    kubeDns:
      enabled: false

    # Keep this. It is what you need for pod/deployment/statefulset status,
    # CrashLoopBackOff, ImagePullBackOff, restart counts, etc.
    kube-state-metrics:
      fullnameOverride: kube-state-metrics
      prometheus:
        monitor:
          enabled: true
          interval: 60s

    # Keep this. Your node-exporter job was not the real problem, and your repo
    # includes a node-exporter dashboard.
    prometheus-node-exporter:
      fullnameOverride: node-exporter
      prometheus:
        monitor:
          enabled: true
          interval: 60s
      extraArgs:
        - --collector.filesystem.mount-points-exclude=^/(mnt|dev|proc|sys|var/lib/docker/.+)($|/)
        - --collector.textfile.directory=/run/prometheus
      extraHostVolumeMounts:
        - name: node-exporter-textfile-collector-scripts
          hostPath: /run/prometheus
          mountPath: /run/prometheus
          readOnly: true

    prometheus:
      ingress:
        enabled: false
      route:
        main:
          enabled: true
          hostnames:
            - prometheus.${BASE_DOMAIN}
          annotations:
            cloudflare-operator.io/ignore: "true"
          parentRefs:
            - name: envoy-internal
              namespace: network
              sectionName: https

      prometheusSpec:
        retention: 3d
        retentionSize: 8GB
        scrapeInterval: 60s
        evaluationInterval: 60s

        # Keep your existing broad discovery so blackbox, smartctl, kthxbye,
        # kube-ephemeral-container-exporter, CNPG, Flux, etc. keep working.
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false

        resources:
          requests:
            cpu: 100m
            memory: 512Mi

        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 10Gi

        additionalScrapeConfigs:
          - job_name: node-exporter
            scrape_interval: 60s
            static_configs:
              - targets:
                  - vpn.srv.${BASE_DOMAIN}:9100
                  - tools.srv.${BASE_DOMAIN}:9100

          - job_name: smartctl-exporter
            scrape_interval: 5m
            static_configs:
              - targets:
                  - vpn.srv.${BASE_DOMAIN}:9633
                  - tools.srv.${BASE_DOMAIN}:9633

          - job_name: heartbeats
            scrape_interval: 60s
            static_configs:
              - targets:
                  - heartbeats.tools.${BASE_DOMAIN}
