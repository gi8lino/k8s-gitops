---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: apt-packages
  namespace: observability
spec:
  groups:
    - name: apt-packages
      rules:
        - alert: NodeRebootRequired
          expr: node_reboot_required * on(instance) group_left(nodename) (node_uname_info) > 0
          for: 24h
          labels:
            severity: warning
          annotations:
            summary: Reboot needed
            description: Node «{{ $labels.nodename }}» needs to reboot.

        - alert: NodePackageUpdatesAvailable
          expr: apt_upgrades_pending * on(instance) group_left(nodename) (node_uname_info) > 0
          for: 24h
          labels:
            severity: warning
          annotations:
            summary: Updates available
            description: Updates for «{{ $labels.nodename }}» available.

        - alert: NodeAutoremovePackagePending
          expr: apt_autoremove_pending * on(instance) group_left(nodename) (node_uname_info) > 0
          for: 48h
          labels:
            severity: warning
          annotations:
            summary: Autoremove packages pending
            description: Autoremove packages for «{{ $labels.nodename }}» have been pending for 48h.
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hwmon
  namespace: observability
spec:
  groups:
    - name: hwmon
      rules:
        - alert: HostNodeOvertemperatureAlarm
          expr: (
            node_hwmon_temp_crit_alarm_celsius
            * on(instance) group_left(nodename)
            node_uname_info
            ) == 1
          labels:
            severity: critical
          annotations:
            summary: Host «{{ $labels.nodename }}» overtemperature alarm
            description: |
              Hardware overtemperature alarm is active.
              VALUE = {{ $value }}
              LABELS = {{ $labels }}

        - alert: HostCpuTempHigh
          expr: (
            avg_over_time(
            node_hwmon_temp_celsius{chip=~"platform_coretemp.*"}[15m]
            )
            * on(instance) group_left(nodename)
            node_uname_info
            ) > 85
          labels:
            severity: warning
          annotations:
            summary: 'Host «{{ $labels.nodename }}» CPU running hot: {{ printf "%.1f" $value }} °C'
            description: "CPU «{{ $labels.chip }}» on «{{ $labels.nodename }}» has a sustained high temperature (> 85 °C 15m avg)."

        - alert: HostCpuTooHot
          expr: (
            max_over_time(
            node_hwmon_temp_celsius{chip=~"platform_coretemp.*"}[5m]
            )
            * on(instance) group_left(nodename)
            node_uname_info
            ) > 90
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: 'Host «{{ $labels.nodename }}» CPU too hot: {{ printf "%.1f" $value }} °C'
            description: "CPU «{{ $labels.chip }}» on «{{ $labels.nodename }}» has been above 90 °C for at least 5 minutes."

        - alert: HostNvmeControllerTooHot
          expr: (
            max_over_time(
            node_hwmon_temp_celsius{chip=~"nvme.*"}[5m]
            )
            * on(instance) group_left(nodename)
            node_uname_info
            ) > 75
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: 'Host «{{ $labels.nodename }}» NVMe controller hot: {{ printf "%.1f" $value }} °C'
            description: "NVMe controller «{{ $labels.chip }}» on «{{ $labels.nodename }}» is hot (> 75 °C 5m max)."

        - alert: RaspberryTooHot
          expr: (
            node_hwmon_temp_celsius{chip=~"thermal_thermal_zone.*"}
            * on(instance) group_left(nodename)
            node_uname_info
            ) > 75
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: 'Raspberry «{{ $labels.nodename }}» CPU too hot: {{ printf "%.1f" $value }} °C'
            description: "Raspberry SoC on «{{ $labels.nodename }}» is hot (> 75 °C 5m max)."
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubernetes-basic
  namespace: observability
spec:
  groups:
    - name: kubernetes-basic
      rules:
        - alert: BasicKubeNodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: Node «{{ $labels.node }}» is not ready
            description: Node «{{ $labels.node }}» has been not ready for 15 minutes.

        - alert: BasicKubeNodePressure
          expr: kube_node_status_condition{condition=~"MemoryPressure|DiskPressure|PIDPressure",status="true"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Node «{{ $labels.node }}» has {{ $labels.condition }}
            description: Node «{{ $labels.node }}» reports {{ $labels.condition }} for 15 minutes.

        - alert: BasicKubePodCrashLooping
          expr: max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"}[10m]) >= 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Pod «{{ $labels.namespace }}/{{ $labels.pod }}» is crash-looping
            description: Container «{{ $labels.container }}» has been in CrashLoopBackOff.

        - alert: BasicKubeDeploymentReplicasMismatch
          expr: kube_deployment_spec_replicas != kube_deployment_status_replicas_available
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: Deployment «{{ $labels.namespace }}/{{ $labels.deployment }}» is not fully available
            description: Deployment replicas have been unavailable for 30 minutes.

        - alert: BasicKubeStatefulSetReplicasMismatch
          expr: kube_statefulset_replicas != kube_statefulset_status_replicas_ready
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: StatefulSet «{{ $labels.namespace }}/{{ $labels.statefulset }}» is not fully ready
            description: StatefulSet replicas have been unavailable for 30 minutes.

        - alert: BasicKubePersistentVolumeClaimPending
          expr: kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: PVC «{{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }}» is pending
            description: PersistentVolumeClaim has been pending for 15 minutes.
