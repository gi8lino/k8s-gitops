---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: cilium
spec:
  interval: 20m
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: cilium
      version: 1.19.5
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
      interval: 30m
  values:
    envoy:
      enabled: false

    hubble:
      enabled: false
      metrics:
        enabled: []
        serviceMonitor:
          enabled: false
        dashboards:
          enabled: false
      observe:
        enabled: true
      relay:
        enabled: true
        prometheus:
          serviceMonitor:
            enabled: false
      ui:
        enabled: true
        frontend:
          server:
            ipv6:
              enabled: false
        ingress:
          enabled: false

    operator:
      replicas: 1
      prometheus:
        enabled: false
        serviceMonitor:
          enabled: false
      dashboards:
        enabled: false

    ipam:
      operator:
        clusterPoolIPv4MaskSize: 24
        clusterPoolIPv4PodCIDRList:
          - ${POD_NETWORK_RANGE_V4}

    kubeProxyReplacement: true
    k8sServiceHost: k3s.srv.${BASE_DOMAIN}
    k8sServicePort: 6443

    nodeinit:
      enabled: true

    nodePort:
      enabled: false

    l2announcements:
      enabled: true

    externalIPs:
      enabled: true

    ipv6:
      enabled: false

    bpf:
      masquerade: true

    prometheus:
      enabled: false
      serviceMonitor:
        enabled: false
        trustCRDsExist: true

    dashboards:
      enabled: false
