---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: snapraid
  namespace: envoy-gateway-system
spec:
  endpoints:
    - fqdn:
        hostname: snapraid.${BASE_DOMAIN}
        port: 7627
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: snapraid
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - snapraid.${BASE_DOMAIN}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: snapraid
