---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab
  namespace: gitlab
spec:
  interval: 20m
  driftDetection:
    mode: enabled
  dependsOn:
    - name: gitlab-garage
      namespace: gitlab
    - name: gitlab-valkey
      namespace: gitlab
  chart:
    spec:
      chart: gitlab
      version: 10.2.0
      sourceRef:
        kind: HelmRepository
        name: gitlab
        namespace: flux-system
      interval: 30m
  values:
    installCertmanager: false
    gitlab:
      gitlab-exporter:
        enabled: false
      gitlab-shell:
        maxReplicas: 1
        minReplicas: 1
      #migrations:
      #  enabled: true
      sidekiq:
        deployment:
          strategy:
            type: Recreate
        maxReplicas: 1
        minReplicas: 1
      toolbox:
        extraInitContainers: |
          - name: configure-backup-object-storage
            image: busybox:1.38.0
            command:
              - sh
              - -ec
            args:
              - |
                umask 077
                printf '%s\n' \
                  '[default]' \
                  "access_key = $${DESTINATION_ACCESSKEY}" \
                  "secret_key = $${DESTINATION_SECRETKEY}" \
                  'bucket_location = us-east-1' \
                  'host_base = minio.minio.svc.cluster.local:9000' \
                  'host_bucket = minio.minio.svc.cluster.local:9000' \
                  'use_https = False' \
                  'preserve_attrs = False' \
                  > /init-secrets/backup-object-storage.s3cfg
            envFrom:
              - secretRef:
                  name: gitlab-backups
            volumeMounts:
              - name: toolbox-secrets
                mountPath: /init-secrets
        backups:
          objectStorage:
            config:
              secret: gitlab-object-storage-s3cmd
              key: config
          cron:
            enabled: true
            timeZone: Europe/Zurich
            schedule: 0 1 * * *
            extraArgs: >-
              --backend-data s3
              --backend-backup s3
              --s3tool-data s3cmd
              --s3tool-backup s3cmd
              --s3config /etc/gitlab/backup-object-storage.s3cfg
              --maximum-backups 3
            successfulJobsHistoryLimit: 1
      webservice:
        deployment:
          strategy:
            type: Recreate
        maxReplicas: 1
        minReplicas: 1
    gitlab-runner:
      install: false
    global:
      psql:
        host: gitlab-postgres-rw.gitlab.svc.cluster.local
        password:
          key: password
          secret: gitlab-postgres-app
      redis:
        host: gitlab-valkey.gitlab.svc.cluster.local
        port: 6379
        auth:
          enabled: true
          secret: gitlab-valkey-auth
          key: default-password
      gatewayApi:
        configureCertmanager: false
        enabled: false
        installEnvoy: false
      kas:
        enabled: false
      appConfig:
        backups:
          bucket: gitlab
          tmpBucket: gitlab-tmp
        dependencyProxy:
          enabled: true
          bucket: gitlab-dependency-proxy
        object_store:
          enabled: true
          connection:
            secret: gitlab-object-storage
            key: config
        terraformState:
          enabled: true
        omniauth:
          enabled: true
          allowSingleSignOn:
            - openid_connect
          syncProfileFromProvider:
            - openid_connect
          syncProfileAttributes:
            - email
          autoSignInWithProvider: openid_connect
          autoLinkUser: true
          blockAutoCreatedUsers: false
          providers:
            - secret: gitlab-oidc-sso
      edition: ce
      email:
        display_name: gitlab@${BASE_DOMAIN}
        from: git@${BASE_DOMAIN}
        reply_to: git@${BASE_DOMAIN}
        subject_suffix: null
      grafana:
        enabled: false
      hosts:
        domain: ${BASE_DOMAIN}
        gitlab:
          name: git.${BASE_DOMAIN}
        registry:
          name: registry.${BASE_DOMAIN}
      registry:
        bucket: registry
      smtp:
        authentication: login
        enabled: true
        openssl_verify_mode: peer
        password:
          key: password
          secret: gitlab-mail-password
        port: 587
        starttls_auto: true
      time_zone: Europe/Zurich
    prometheus:
      install: false
    registry:
      database:
        enabled: true
        name: registry
        user: registry
        password:
          secret: gitlab-postgres-registry
          key: password
      storage:
        secret: gitlab-registry-storage
        key: config
      hpa:
        maxReplicas: 1
        minReplicas: 1
  install:
    crds: Skip
  upgrade:
    crds: Skip
  valuesFrom:
    - kind: Secret
      name: gitlab-helm-values
      optional: false
  postRenderers:
    - kustomize:
        patches:
          - patch: |-
              apiVersion: autoscaling/v2
              kind: HorizontalPodAutoscaler
              metadata:
                name: gitlab-registry
                namespace: gitlab
              $patch: delete
          - patch: |-
              apiVersion: autoscaling/v2
              kind: HorizontalPodAutoscaler
              metadata:
                name: gitlab-webservice-default
                namespace: gitlab
              $patch: delete
          - patch: |-
              apiVersion: autoscaling/v2
              kind: HorizontalPodAutoscaler
              metadata:
                name: gitlab-gitlab-shell
                namespace: gitlab
              $patch: delete
          - patch: |-
              apiVersion: autoscaling/v2
              kind: HorizontalPodAutoscaler
              metadata:
                name: gitlab-sidekiq-all-in-1-v2
                namespace: gitlab
              $patch: delete
          - patch: |-
              apiVersion: policy/v1
              kind: PodDisruptionBudget
              metadata:
                name: gitlab-gitaly
                namespace: gitlab
              $patch: delete
          - patch: |-
              apiVersion: policy/v1
              kind: PodDisruptionBudget
              metadata:
                name: gitlab-gitlab-shell
                namespace: gitlab
              $patch: delete
          - patch: |-
              apiVersion: policy/v1
              kind: PodDisruptionBudget
              metadata:
                name: gitlab-sidekiq-all-in-1-v1
                namespace: gitlab
              $patch: delete
          - patch: |-
              apiVersion: policy/v1
              kind: PodDisruptionBudget
              metadata:
                name: gitlab-webservice-default
                namespace: gitlab
              $patch: delete
          - patch: |-
              apiVersion: policy/v1
              kind: PodDisruptionBudget
              metadata:
                name: gitlab-registry-v1
                namespace: gitlab
              $patch: delete
